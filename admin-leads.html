<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes | Dra. Gleyciane</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #001f3f; --accent: #e5c05b; --pendente: #ff4d4d; --andamento: #f1c40f; --concluido: #2ecc71; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; position: relative;}
        .voltar { position: absolute; left: 20px; top: 30px; color: white; text-decoration: none; font-size: 0.9rem; }
        
        .filtros { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filtro-btn { 
            padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; 
            font-weight: bold; background: white; transition: 0.3s; display: flex; align-items: center; gap: 8px;
            position: relative; /* Necessário para a bolinha de alerta */
        }
        .filtro-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Mini contador dentro do botão */
        .btn-count { 
            background: #eee; color: #666; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; 
        }
        .active .btn-count { background: var(--accent); color: var(--primary); }

        /* Bolinha de Alerta (Sinalizador de Novos) */
        .dot-alerta {
            position: absolute;
            top: -5px;
            right: -2px;
            width: 12px;
            height: 12px;
            background-color: var(--pendente);
            border-radius: 50%;
            border: 2px solid white;
            display: none; /* Inicia escondida */
            box-shadow: 0 0 5px rgba(255, 77, 77, 0.5);
        }

        .lead-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; transition: 0.3s; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: white; }
        
        .status-novo { border-left: 8px solid var(--pendente); }
        .bg-novo { background: var(--pendente); }
        .status-andamento { border-left: 8px solid var(--andamento); }
        .bg-andamento { background: var(--andamento); }
        .status-concluido { border-left: 8px solid var(--concluido); opacity: 0.7; }
        .bg-concluido { background: var(--concluido); }

        .lead-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .lead-info p { margin: 3px 0; font-size: 0.9rem; color: #444; }
        
        .controles { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-zap { background: #25D366; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.8rem; font-weight: bold; }
        .select-status { padding: 5px; border-radius: 5px; font-size: 0.8rem; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>

<header>
    <a href="admin.html" class="voltar"><i class="fas fa-arrow-left"></i> Painel Principal</a>
    <h1>📋 Gestão de Clientes (Leads)</h1>
    <p id="contador">Carregando resumo...</p>
</header>

<div class="filtros">
    <button class="filtro-btn active" onclick="filtrar('todos', this)">
        Todos <span class="btn-count" id="c-todos">0</span>
    </button>
    <button class="filtro-btn" onclick="filtrar('Novo', this)">
        Novos <span class="btn-count" id="c-novos">0</span>
        <span id="alerta-novos" class="dot-alerta"></span>
    </button>
    <button class="filtro-btn" onclick="filtrar('Em Atendimento', this)">
        Atendimento <span class="btn-count" id="c-andamento">0</span>
    </button>
    <button class="filtro-btn" onclick="filtrar('Concluído', this)">
        Concluídos <span class="btn-count" id="c-concluidos">0</span>
    </button>
</div>

<div id="leads-container"></div>

<script>
    const SUPABASE_URL = 'https://ueduzgoewlivkluiyqql.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZHV6Z29ld2xpdmtsdWl5cXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODAxMzAsImV4cCI6MjA4ODc1NjEzMH0.EM2s38El81fZYT-WVrxa7P_xX0e58EHQxdwreVgQecA';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let todosLeads = [];
    let filtroAtual = 'todos';

    async function carregarLeads() {
        const { data, error } = await supabaseClient
            .from('site_leads')
            .select('*')
            .order('data_hora', { ascending: false });

        if (error) return alert("Erro ao carregar");
        todosLeads = data;
        
        atualizarInterface();
    }

    function atualizarInterface() {
        // Cálculo das somas
        const total = todosLeads.length;
        const novos = todosLeads.filter(l => (l.status === 'Novo' || !l.status)).length;
        const andamento = todosLeads.filter(l => l.status === 'Em Atendimento').length;
        const concluidos = todosLeads.filter(l => l.status === 'Concluído').length;

        // Atualiza os números nos botões
        document.getElementById('c-todos').innerText = total;
        document.getElementById('c-novos').innerText = novos;
        document.getElementById('c-andamento').innerText = andamento;
        document.getElementById('c-concluidos').innerText = concluidos;

        // Regra da bolinha vermelha (Sinalizador)
        const bolinha = document.getElementById('alerta-novos');
        bolinha.style.display = (novos > 0) ? 'block' : 'none';

        // Filtra a lista baseada na escolha atual
        const listaParaExibir = filtroAtual === 'todos' ? todosLeads : todosLeads.filter(l => l.status === filtroAtual);
        renderizar(listaParaExibir);
        
        // Atualiza o texto do resumo no topo
        document.getElementById('contador').innerText = `${total} contatos no total | ${novos} pendentes de resposta`;
    }

    function renderizar(lista) {
        const container = document.getElementById('leads-container');
        if (lista.length === 0) {
            container.innerHTML = `<p style="text-align:center; margin-top:50px; color:#666;">Nenhum cliente encontrado neste filtro.</p>`;
            return;
        }

        container.innerHTML = lista.map(lead => {
            const statusLabel = lead.status || 'Novo';
            const statusClass = statusLabel === 'Concluído' ? 'status-concluido' : (statusLabel === 'Em Atendimento' ? 'status-andamento' : 'status-novo');
            const badgeClass = statusLabel === 'Concluído' ? 'bg-concluido' : (statusLabel === 'Em Atendimento' ? 'bg-andamento' : 'bg-novo');
            
            return `
                <div class="lead-card ${statusClass}">
                    <div class="lead-header">
                        <div>
                            <span class="status-badge ${badgeClass}">${statusLabel}</span>
                            <div style="font-weight:bold; font-size:1.2rem; margin-top:5px; color:#001f3f;">${lead.nome}</div>
                        </div>
                        <span style="font-size:0.8rem; color:#666;">${new Date(lead.data_hora).toLocaleString('pt-BR')}</span>
                    </div>
                    <div class="lead-info">
                        <p><strong>Assunto:</strong> ${lead.assunto}</p>
                        <p><strong>Mensagem:</strong> ${lead.mensagem}</p>
                        <p><strong>WhatsApp:</strong> ${lead.whatsapp}</p>
                        <p><strong>E-mail:</strong> ${lead.email}</p>
                    </div>
                    <div class="controles">
                        <a href="https://api.whatsapp.com/send?phone=55${lead.whatsapp.replace(/\D/g,'')}" target="_blank" class="btn-zap">
                            <i class="fab fa-whatsapp"></i> Chamar no Zap
                        </a>
                        <label style="font-size:0.7rem; font-weight:bold;">MUDAR STATUS:</label>
                        <select class="select-status" onchange="alterarStatus(${lead.id}, this.value)">
                            <option value="Novo" ${statusLabel === 'Novo' ? 'selected' : ''}>Pendente (Novo)</option>
                            <option value="Em Atendimento" ${statusLabel === 'Em Atendimento' ? 'selected' : ''}>Em Atendimento</option>
                            <option value="Concluído" ${statusLabel === 'Concluído' ? 'selected' : ''}>Concluído / Arquivar</option>
                        </select>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function alterarStatus(id, novoStatus) {
        const { error } = await supabaseClient
            .from('site_leads')
            .update({ status: novoStatus })
            .eq('id', id);

        if (!error) carregarLeads();
    }

    function filtrar(status, btn) {
        filtroAtual = status;
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        atualizarInterface();
    }

    window.onload = carregarLeads;
</script>
</body>
</html>
